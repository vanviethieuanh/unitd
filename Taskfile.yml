# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  SYSTEMD_PATH: tmp/systemd
  MAN_FILES:
    - systemd.automount
    - systemd.device
    - systemd.mount
    - systemd.path
    - systemd.scope
    - systemd.service
    - systemd.slice
    - systemd.socket
    - systemd.swap
    - systemd.timer
    - systemd.target
    - systemd.unit

tasks:
  default:
    cmds:
      - go run .

  clone-or-pull-systemd:
    desc: Clone systemd repo if it doesn't exist, otherwise pull latest changes
    cmds:
      - |
        if [ -d "{{.SYSTEMD_PATH}}" ]; then
          cd {{.SYSTEMD_PATH}} && git pull
        else
          git clone https://github.com/systemd/systemd {{.SYSTEMD_PATH}}
        fi

  gen:
    deps:
      - clone-or-pull-systemd
    cmds:
      - mkdir -p tmp
      - mkdir -p ./tmp/gperf

      - task: extract-gperfs
      - ./scripts/extract_dump_config.sh "{{.SYSTEMD_PATH}}" ./tmp/gperf/parser_type.jsonl
      - task: gen-files

  gen-files:
    internal: true
    deps:
      - for:
          var: MAN_FILES
        task: gen-file
        vars:
          MAN: "{{ .ITEM }}"
    cmds:
      - gofmt -w .

  gen-file:
    internal: true
    cmds:
      - go run ./cmd/gen --man {{.MAN}} > ./configs/{{.MAN}}.go

  extract-gperfs:
    internal: true
    silent: true
    vars:
      FILES:
        sh: find tmp/systemd/src -type f \( -name '*.gperf' -o -name '*.gperf.in' \)
    deps:
      - for:
          var: FILES
        task: extract-gperf
        vars:
          ITEM: "{{.ITEM}}"

  extract-gperf:
    internal: true
    silent: true
    cmds:
      - ./scripts/extract_gperf.sh "{{.ITEM}}" "./tmp/gperf"
